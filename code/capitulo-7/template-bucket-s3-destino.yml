AWSTemplateFormatVersion: '2010-09-09'
Description: Template para S3 (Bucket destino) - Replicacion S3
Metadata:
  Author: Brayan Neciosup
  Proyecto: Replicacion S3 - MultiRegion


Parameters:

  BucketNameDestinoParameter:
    Type: String
    Default: bucket-brayan-destino-replicacion-cf
Resources:
  BucketDestinoReplicacionS3: 
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketNameDestinoParameter 
      VersioningConfiguration: 
        Status: Enabled 
Outputs:
  BucketName:
    Value: !Ref BucketDestinoReplicacionS3
    Description: Nombre del bucket de destino para la replicación S3
