AWSTemplateFormatVersion: '2010-09-09'
Description: Lambda Function - Mover Objectos S3 Lambda
Metadata:
  Author: Brayan Neciosup
  Proyecto: Mover Objetos S3 mediante AWS Lambda

Parameters:

  FunctionNameParameter:
    Type: String
    Default: lambda-mover-objetos-brayan-cf

  BucketLambdaCodeParameter:
    Type: String
    Default: bucket-lambdas-code-brayan-747554529824-us-east-1-an

  ZipCodeLambdaParameter:
    Type: String
    Default: lambda.zip

  BucketS3ARNParameter:
    Type: String
    Default: arn:aws:s3:::origen-bucket-brayan-mover-objetos

Resources:

  LambdaFunctionMoverObjetosS3:
    Type: AWS::Lambda::Function
    Properties:
      Architectures: 
        - x86_64
      Code: 
          S3Bucket: !Ref BucketLambdaCodeParameter 
          S3Key: !Ref ZipCodeLambdaParameter 
      Description: Lambda de Prueba desde CF
      FunctionName: !Ref FunctionNameParameter
      Handler: app.lambda_handler 
      MemorySize: 128 
      Role: !ImportValue ARNRoleLambdaMoverObjetosS3 
      Runtime: python3.14 

  TriggerLambdaMoverObjetosS3:
    Type: AWS::Lambda::Permission
    DependsOn: LambdaFunctionMoverObjetosS3 
    Properties:
      Action: lambda:InvokeFunction 
      FunctionName: !Ref FunctionNameParameter
      Principal: s3.amazonaws.com 
      SourceArn: !Ref BucketS3ARNParameter 

Outputs:
  LambdaFunctionName:
    Value: !GetAtt LambdaFunctionMoverObjetosS3.Arn
    Export:
      Name: ARNLambdaMoverObjetosS3 